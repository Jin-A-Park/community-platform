spring.application.name=first-project
spring.jpa.defer-datasource-initialization=true

#JPA 로깅 설정
logging.level.org.hibernate.SQL=DEBUG
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

#DB 설정
spring.datasource.url=jdbc:mysql://localhost:3306/community_platform?useSSL=false&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=thisIsASecretKeyForJwtThatMustBeAtLeast256BitsLong1234567890
jwt.expiration=86400000